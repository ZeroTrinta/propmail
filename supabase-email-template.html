<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your PropMail account</title>
</head>
<body style="margin:0;padding:0;background:#0b0f14;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0b0f14;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:1.4rem;font-weight:700;color:#63b3ed;letter-spacing:0.01em;">PropMail</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:rgba(232,237,242,0.04);border:1px solid rgba(232,237,242,0.08);border-radius:12px;padding:40px 36px;">

              <p style="margin:0 0 8px;font-size:0.72rem;letter-spacing:0.16em;color:#63b3ed;text-transform:uppercase;">One last step</p>
              <h1 style="margin:0 0 16px;font-size:1.6rem;font-weight:700;color:#e8edf2;line-height:1.2;">Confirm your account</h1>
              <p style="margin:0 0 28px;font-size:0.93rem;color:rgba(232,237,242,0.55);line-height:1.65;">
                Click the button below to verify your email and start generating real estate emails in seconds.
              </p>

              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#63b3ed;color:#0b0f14;text-decoration:none;font-weight:600;font-size:0.9rem;padding:13px 28px;border-radius:7px;letter-spacing:0.02em;">
                Confirm my account
              </a>

              <p style="margin:28px 0 0;font-size:0.78rem;color:rgba(232,237,242,0.25);line-height:1.6;">
                If you didn't create a PropMail account, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:0.72rem;color:rgba(232,237,242,0.2);">
                PropMail · AI emails for real estate agents
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
